<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>이지스퍼블리싱 서점 리뷰 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f1f5f9; color: #1e293b;
  font-size: 15px; word-break: keep-all;
}

header {
  background: linear-gradient(135deg, #0f2744, #1e3a5f);
  color: #fff; padding: 20px 32px;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
header span { font-size: 13px; color: #93c5fd; }

.toolbar {
  display: flex; gap: 12px; align-items: center;
  padding: 16px 32px; background: #fff; border-bottom: 1px solid #e2e8f0;
  flex-wrap: wrap;
}
.toolbar input, .toolbar select {
  padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
  font-size: 14px; outline: none; background: #f8fafc; color: #1e293b;
}
.toolbar input:focus, .toolbar select:focus { border-color: #3b82f6; background: #fff; }
.toolbar input { width: 240px; }
.date-picker { position: relative; }
#date-btn {
  padding: 9px 12px; border: 1px solid #cbd5e1; border-radius: 8px;
  font-size: 14px; background: #f8fafc; color: #1e293b; cursor: pointer;
}
#date-btn:hover { border-color: #3b82f6; }
.calendar {
  display: none; position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
  width: 300px; padding: 14px; background: #fff;
  border: 1px solid #e2e8f0; border-radius: 12px;
  box-shadow: 0 8px 24px rgba(15, 23, 42, .12);
}
.calendar.open { display: block; }
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-title { font-size: 14px; font-weight: 700; }
.cal-nav {
  width: 28px; height: 28px; border: none; border-radius: 6px;
  background: #f1f5f9; color: #475569; font-size: 12px; cursor: pointer;
}
.cal-nav:hover:not(:disabled) { background: #e2e8f0; }
.cal-nav:disabled { opacity: .35; cursor: default; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 600; color: #64748b; padding: 4px 0; }
.cal-dow.sun { color: #dc2626; }
.cal-dow.sat { color: #2563eb; }
.cal-day {
  position: relative; height: 36px; border: none; border-radius: 8px;
  background: none; font-size: 13px; color: #cbd5e1;
}
.cal-day.has { background: #eff6ff; color: #1e293b; font-weight: 700; cursor: pointer; }
.cal-day.has:hover { background: #dbeafe; }
.cal-day.has::after {
  content: ''; position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%; background: #3b82f6;
}
.cal-day.selected, .cal-day.selected:hover { background: #2563eb; color: #fff; }
.cal-day.selected::after { background: #fff; }
.cal-day.today { box-shadow: inset 0 0 0 1.5px #3b82f6; }
#cal-clear {
  width: 100%; margin-top: 10px; padding: 8px; border: none; border-radius: 8px;
  background: #f1f5f9; color: #475569; font-size: 13px; font-weight: 600; cursor: pointer;
}
#cal-clear:hover:not(:disabled) { background: #e2e8f0; }
#cal-clear:disabled { opacity: .5; cursor: default; }
#reset-filters {
  display: none; padding: 9px 14px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  background: #eff6ff; color: #2563eb;
}
#reset-filters:hover { background: #dbeafe; }
.count-badge {
  margin-left: auto; font-size: 14px; font-weight: 600; color: #475569;
  background: #f1f5f9; padding: 7px 14px; border-radius: 20px;
}

.main { max-width: 1100px; margin: 24px auto; padding: 0 24px; }

/* 상단 요약 카드 */
.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  margin-bottom: 28px;
}
.stat-card {
  background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
  padding: 16px 18px;
}
.stat-card .stat-label { font-size: 13px; color: #64748b; margin-bottom: 6px; }
.stat-card .stat-value { font-size: 26px; font-weight: 700; color: #0f2744; }
.stat-card .stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
.stat-card.alert .stat-value { color: #dc2626; }
.stat-card.alert { border-color: #fecaca; background: #fff8f8; }
.tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
.tab { padding:8px 16px; border:1px solid #e2e8f0; background:#fff; border-radius:8px; font-size:14px; font-weight:600; color:#64748b; cursor:pointer; }
.tab.active { background:#0f2744; color:#fff; border-color:#0f2744; }
.best-head { font-size:15px; font-weight:700; color:#0f2744; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.best-count { background:#3b82f6; color:#fff; font-size:12px; padding:2px 9px; border-radius:11px; }
.best-toolbar { margin-bottom:12px; }
.best-toolbar select { padding:8px 12px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; background:#fff; color:#1e293b; max-width:100%; cursor:pointer; }
.best-note { font-size:12px; color:#3730a3; background:#eef2ff; border:1px solid #c7d2fe; border-radius:8px; padding:8px 11px; margin-bottom:14px; line-height:1.6; }
.best-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:14px 18px 14px; margin-bottom:12px; }
.best-quote { font-size:15px; line-height:1.65; color:#1e293b; font-style:italic; }
.best-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; border-top:1px solid #f1f5f9; margin-top:10px; padding-top:10px; }
.best-attr { font-size:12px; color:#64748b; font-weight:600; }
.ins-card { background:#fff; border:1px solid #e2e8f0; border-radius:10px; padding:16px 18px; margin-bottom:12px; }
.ins-head { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; margin-bottom:12px; padding-bottom:10px; border-bottom:1px solid #f1f5f9; }
.ins-book { font-size:15px; font-weight:700; color:#0f2744; }
.ins-meta { font-size:12px; color:#64748b; }
.ins-stars { color:#f59e0b; letter-spacing:-1px; }
.ins-sec { margin-bottom:10px; }
.ins-sec:last-child { margin-bottom:0; }
.ins-label { font-size:13px; font-weight:700; margin-bottom:5px; }
.ins-good .ins-label { color:#15803d; }
.ins-bad .ins-label { color:#b45309; }
.ins-sec ul { margin:0; padding-left:18px; }
.ins-sec li { font-size:13.5px; line-height:1.6; color:#334155; margin-bottom:3px; }
.ins-bad li { color:#7c2d12; }
.ins-none { list-style:none; color:#94a3b8; }
.ins-clean { font-size:12.5px; color:#94a3b8; background:#f8fafc; border-radius:6px; padding:7px 10px; }
.stat-card.clickable { cursor: pointer; transition: background .15s, box-shadow .15s; }
.stat-card.clickable:hover { background: #fff1f1; box-shadow: 0 2px 10px rgba(220,38,38,.12); }
.stat-card.alert .stat-sub { color: #dc2626; font-weight: 600; }

.date-group { margin-bottom: 36px; }
.date-label {
  font-size: 15px; font-weight: 700; color: #334155;
  margin-bottom: 12px; padding-bottom: 8px;
  border-bottom: 2px solid #e2e8f0;
  display: flex; align-items: center; gap: 8px;
}
.date-label.today { color: #1d4ed8; border-bottom-color: #bfdbfe; }
.date-label .day-count {
  background: #3b82f6; color: #fff;
  font-size: 12px; padding: 2px 9px; border-radius: 10px; font-weight: 600;
}
.new-badge {
  background: #dc2626; color: #fff; font-size: 11px; font-weight: 700;
  padding: 2px 7px; border-radius: 6px; letter-spacing: .5px;
}

.book-group { margin-bottom: 16px; }
.book-title {
  font-size: 15px; font-weight: 700; color: #1e293b;
  padding: 12px 16px; background: #fff; border-radius: 10px 10px 0 0;
  border: 1px solid #e2e8f0; border-bottom: none;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.book-title a { color: inherit; text-decoration: none; }
.book-title a:hover { text-decoration: underline; }
.book-title .book-count { font-size: 12px; color: #64748b; font-weight: 500; }

.review-list { border: 1px solid #e2e8f0; border-radius: 0 0 10px 10px; overflow: hidden; }
.review-item {
  padding: 16px; background: #fff; border-bottom: 1px solid #f1f5f9;
  display: grid; grid-template-columns: 96px 1fr; gap: 14px;
}
.review-item:last-child { border-bottom: none; }
.review-item:hover { background: #fafbfc; }
.review-item.low-rating {
  border-left: 4px solid #ef4444; background: #fffafa;
  padding-left: 12px;
}
.review-item.low-rating:hover { background: #fef5f5; }

.review-meta { display: flex; flex-direction: column; gap: 5px; align-items: flex-start; }
.store-badge {
  font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
}
.store-badge.aladin  { background: #fee2e2; color: #dc2626; }
.store-badge.yes24   { background: #ffedd5; color: #c2410c; }
.store-badge.kyobo   { background: #dcfce7; color: #15803d; }
.review-rating { font-size: 13px; font-weight: 600; color: #b45309; }
.review-rating.low { color: #dc2626; }
.review-reviewer { font-size: 12px; color: #64748b; }

.review-text { font-size: 15px; line-height: 1.7; color: #334155; }

.empty { text-align: center; padding: 60px 20px; color: #64748b; font-size: 15px; line-height: 1.8; }
.empty button {
  margin-top: 12px; padding: 9px 18px; border: none; border-radius: 8px;
  background: #3b82f6; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
}

.loading { text-align: center; padding: 80px 20px; color: #64748b; font-size: 15px; }
.spinner {
  width: 32px; height: 32px; margin: 0 auto 16px;
  border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 대응 필요 섹션 */
.action-needed { background:#fff7f7; border:1.5px solid #fecaca; border-radius:12px; padding:14px 16px; margin-bottom:28px; }
.action-head { font-size:15px; font-weight:700; color:#b91c1c; margin-bottom:12px; display:flex; align-items:center; gap:8px; position:relative; cursor:help; }
.an-count { background:#dc2626; color:#fff; font-size:12px; padding:2px 9px; border-radius:11px; font-weight:600; }
.an-hint { font-size:11px; font-weight:500; color:#b91c1c; opacity:.65; }
.an-tip { display:none; position:absolute; left:0; top:135%; z-index:30; width:330px; max-width:90vw;
  background:#1e293b; color:#f1f5f9; font-size:12px; font-weight:400; line-height:1.7;
  padding:11px 13px; border-radius:8px; box-shadow:0 6px 18px rgba(0,0,0,.2); }
.action-head:hover .an-tip, .action-head:focus-within .an-tip { display:block; }
.an-item { background:#fff; border:1px solid #fee2e2; border-left:4px solid #ef4444; border-radius:8px; padding:12px 14px; margin-bottom:10px; }
.an-item:last-child { margin-bottom:0; }
.an-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
.an-book { font-size:13px; font-weight:700; color:#1e293b; text-decoration:none; }
.an-book:hover { text-decoration:underline; }
.an-suggest { margin-top:10px; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:10px 12px; }
.an-suggest-head { font-size:12px; font-weight:700; color:#475569; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.an-copy { font-size:11px; padding:2px 10px; border:1px solid #cbd5e1; background:#fff; border-radius:6px; cursor:pointer; color:#334155; }
.an-copy:hover { background:#f1f5f9; }
.an-suggest-text { font-size:13px; line-height:1.6; color:#334155; white-space:pre-wrap; }
.review-item .an-suggest { grid-column: 1 / -1; }
.an-collapse summary { cursor:pointer; font-size:12px; font-weight:700; color:#475569; }
.an-collapse summary:hover { color:#1e293b; }
.an-collapse .an-suggest-text { margin-top:8px; }
.an-collapse .an-copy { margin-top:8px; }
.an-collapse:not([open]) .an-suggest-text, .an-collapse:not([open]) .an-copy { display:none; }

/* 모바일 */
@media (max-width: 640px) {
  header { padding: 16px 20px; }
  header h1 { font-size: 17px; }
  .toolbar { padding: 12px 16px; gap: 8px; }
  .toolbar input { width: 100%; }
  .toolbar select, .date-picker { flex: 1; min-width: 0; }
  #date-btn { width: 100%; }
  .calendar { left: auto; right: 0; }
  .count-badge { margin-left: 0; }
  .main { padding: 0 12px; margin: 16px auto; }
  .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .stat-card { padding: 12px 14px; }
  .stat-card .stat-value { font-size: 22px; }
  .review-item { grid-template-columns: 1fr; gap: 10px; }
  .review-meta { flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>📚 이지스퍼블리싱 서점 리뷰 대시보드</h1>
    <span id="last-updated">불러오는 중...</span>
  </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="책 제목 또는 리뷰 내용 검색...">
  <select id="store-filter">
    <option value="">전체 서점</option>
    <option value="aladin">알라딘</option>
    <option value="yes24">예스24</option>
    <option value="kyobo">교보문고</option>
  </select>
  <div class="date-picker">
    <button id="date-btn">📅 전체 날짜</button>
    <div class="calendar" id="calendar"></div>
  </div>
  <button id="reset-filters">필터 초기화</button>
  <span class="count-badge" id="count-badge">0개</span>
</div>

<div class="main">
  <div class="tabs">
    <button class="tab active" data-tab="reviews" onclick="switchTab('reviews')">리뷰</button>
    <button class="tab" data-tab="insight" onclick="switchTab('insight')">📊 인사이트</button>
    <button class="tab" data-tab="best" onclick="switchTab('best')">📣 마케팅 문구 활용</button>
  </div>
  <div id="tab-reviews">
    <div class="stats" id="stats" style="display:none"></div>
    <div id="content">
      <div class="loading"><div class="spinner"></div>리뷰 데이터를 불러오는 중...</div>
    </div>
  </div>
  <div id="tab-best" style="display:none"></div>
  <div id="tab-insight" style="display:none"></div>
</div>

<script>
let allReviews = [];

const storeLabel = s => ({ aladin:'알라딘', yes24:'예스24', kyobo:'교보문고' }[s] || s);
const DAYS = ['일','월','화','수','목','금','토'];

function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
const TODAY = toISO(new Date());
const YESTERDAY = toISO(new Date(Date.now() - 86400000));

function formatDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  if (!y || !m || !d) return iso;
  const base = `${m}월 ${d}일 (${DAYS[new Date(y, m-1, d).getDay()]})`;
  if (iso === TODAY) return `오늘 · ${base}`;
  if (iso === YESTERDAY) return `어제 · ${base}`;
  return base;
}

// ── 캘린더 날짜 필터 ──
let selectedDate = '';
let dateCounts = {};                      // 'YYYY-MM-DD' → 리뷰 수
let calY, calM;                           // 캘린더에 표시 중인 연/월
let minYM = TODAY.slice(0, 7), maxYM = TODAY.slice(0, 7);

function openMonthOf(iso) {
  const [y, m] = iso.split('-').map(Number);
  calY = y; calM = m - 1;
}
openMonthOf(TODAY);

function updateDateBtn() {
  document.getElementById('date-btn').textContent =
    `📅 ${selectedDate ? formatDate(selectedDate) : '전체 날짜'}`;
}

function buildCalendar() {
  const cur = `${calY}-${String(calM + 1).padStart(2, '0')}`;
  const startDow = new Date(calY, calM, 1).getDay();
  const lastDay = new Date(calY, calM + 1, 0).getDate();

  let html = `<div class="cal-head">
    <button class="cal-nav" data-nav="-1" ${cur <= minYM ? 'disabled' : ''}>◀</button>
    <span class="cal-title">${calY}년 ${calM + 1}월</span>
    <button class="cal-nav" data-nav="1" ${cur >= maxYM ? 'disabled' : ''}>▶</button>
  </div><div class="cal-grid">`;
  DAYS.forEach((d, i) =>
    html += `<span class="cal-dow${i === 0 ? ' sun' : i === 6 ? ' sat' : ''}">${d}</span>`);
  for (let i = 0; i < startDow; i++) html += '<span></span>';
  for (let d = 1; d <= lastDay; d++) {
    const iso = `${cur}-${String(d).padStart(2, '0')}`;
    const count = dateCounts[iso] || 0;
    const cls = 'cal-day' + (count ? ' has' : '')
      + (iso === selectedDate ? ' selected' : '') + (iso === TODAY ? ' today' : '');
    html += count
      ? `<button class="${cls}" data-date="${iso}" title="리뷰 ${count}개">${d}</button>`
      : `<button class="${cls}" disabled>${d}</button>`;
  }
  html += `</div><button id="cal-clear" ${selectedDate ? '' : 'disabled'}>전체 날짜 보기</button>`;
  document.getElementById('calendar').innerHTML = html;
}

function closeCalendar() {
  document.getElementById('calendar').classList.remove('open');
}

// 서점마다 별점 형식이 다름: '10'(10점 만점), '5점/5점' 등 → 5점 만점으로 환산
function parseRating(raw) {
  if (!raw) return null;
  const m = String(raw).match(/(\d+(?:\.\d+)?)\s*점?\s*(?:\/\s*(\d+(?:\.\d+)?)\s*점?)?/);
  if (!m) return null;
  const n = parseFloat(m[1]);
  const max = m[2] ? parseFloat(m[2]) : (n > 5 ? 10 : 5);
  if (!max || n > max) return null;
  return Math.round((n / max) * 5 * 10) / 10;
}

function ratingBadge(rating) {
  const n = parseRating(rating);
  if (n === null) return '';
  const low = n <= 2 ? ' low' : '';
  return `<span class="review-rating${low}">⭐ ${n}점</span>`;
}

// 대응이 필요한 리뷰: 별점 ★2 이하(5점 환산)만
function needsResponse(r) {
  const n = parseRating(r.rating);
  return n !== null && n <= 2;
}

// 대응 필요 노출 기간(일): 별점 ★2 이하 + 최근 N일 이내
const AN_WINDOW_DAYS = 3;
function isActionable(r) {
  if (!needsResponse(r)) return false;
  const cutoff = toISO(new Date(Date.now() - AN_WINDOW_DAYS * 86400000));
  return r.date > cutoff;
}

// 상단 '대응 필요' 카드 클릭 → 대응 필요 섹션으로 스크롤
function scrollToActionNeeded() {
  resetFilters();  // 필터 걸려 있으면 해제해 섹션이 보이도록
  const el = document.querySelector('.action-needed');
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 탭 전환 (리뷰 / 베스트 후기)
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('tab-reviews').style.display = name === 'reviews' ? '' : 'none';
  document.getElementById('tab-best').style.display = name === 'best' ? '' : 'none';
  document.getElementById('tab-insight').style.display = name === 'insight' ? '' : 'none';
  document.querySelector('.toolbar').style.display = name === 'reviews' ? '' : 'none';
  if (name === 'best') renderBest();
  if (name === 'insight') renderInsight();
}

// 후기 본문에서 협찬 고지·군더더기 제거 (무료, 문장 단위 정리)
function cleanQuote(text, title) {
  let t = (text || '').replace(/\r/g, ' ')
    .replace(/\[[^\]]*리뷰\]/g, ' ')   // [일반 리뷰] 등
    .replace(/#[^\s#]+/g, ' ');        // 해시태그
  // 협찬·홍보성 단어가 든 문장은 통째로 제거
  const bad = /(제공\s*받|지원\s*받|협찬|무상|서평\s*이벤트|체험단|증정|소정의|원고료)/;
  t = t.split(/(?<=[.!?。])/).filter(s => !bad.test(s)).join(' ').replace(/\s+/g, ' ').trim();
  // 맨 앞에 책 제목(+ '서평/리뷰/후기')이 그대로 붙어있으면 제거 (공백 유연 매칭)
  if (title) {
    const tt = title.trim().split(/\s+/).map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('\\s+');
    t = t.replace(new RegExp('^' + tt + '\\s*(서평|리뷰|후기)?[\\s:·\\-]*'), '').trim();
  }
  return t.replace(/\s+/g, ' ').trim();
}
// 너무 길면 문장 단위로 잘라 인용구 길이로
function snippetOf(t, max) {
  if (t.length <= max) return t;
  const s = t.slice(0, max);
  const i = s.lastIndexOf('.');
  return i > max * 0.4 ? s.slice(0, i + 1).trim() : s.trim() + '…';
}

// 마케팅 문구: marketing_quotes.json(사람이 엄선·정리한 추천 문구)을 책별로 표시
let bestBook = '';
let marketingQuotes = [];
function renderBest() {
  const el = document.getElementById('tab-best');
  const all = marketingQuotes;
  if (!all.length) {
    el.innerHTML = `<div class="empty">아직 마케팅 추천 문구가 없습니다.</div>`;
    return;
  }
  const counts = {};
  all.forEach(x => counts[x.book] = (counts[x.book] || 0) + 1);
  const books = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  if (bestBook && !counts[bestBook]) bestBook = '';
  const shown = bestBook ? all.filter(x => x.book === bestBook) : all;
  const opts = `<option value="">📚 전체 도서 (${all.length})</option>` +
    books.map(b => `<option value="${b.replace(/"/g, '&quot;')}"${b === bestBook ? ' selected' : ''}>${b} (${counts[b]})</option>`).join('');
  let html = `<div class="best-head">📣 마케팅 문구로 쓰기 좋은 후기 <span class="best-count">${shown.length}</span></div>
    <div class="best-toolbar"><select id="best-book" onchange="bestBook=this.value; renderBest()">${opts}</select></div>
    <div class="best-note"><b>이렇게 골랐어요</b> — 실제 독자 후기 중 <b>구체적이고 설득력 있는 문장</b>만 추려, 협찬 고지·군더더기를 정리해 다듬은 추천 카피입니다. <b>문구 복사</b>를 누르면 출처까지 붙어 복사돼요. (SNS·상세페이지·카드뉴스에 바로 활용)</div>`;
  shown.forEach(x => {
    const n = x.rating || 5;
    const copyStr = `"${x.quote}" — 《${x.book}》 독자 후기 (${storeLabel(x.store)} ⭐${n})`;
    html += `<div class="best-card">
      <div class="best-quote">“${x.quote}”</div>
      <div class="best-meta">
        <span class="best-attr">《${x.book}》 · ${storeLabel(x.store)} ⭐${n}점 · ${x.reviewer || ''}</span>
        <button class="an-copy" style="margin-left:auto" onclick="copyBest(this)">📋 문구 복사</button>
      </div>
      <div class="best-copy" style="display:none">${copyStr}</div>
    </div>`;
  });
  el.innerHTML = html;
}
function copyBest(btn) {
  const t = btn.closest('.best-card').querySelector('.best-copy').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const o = btn.textContent; btn.textContent = '복사됨'; setTimeout(() => btn.textContent = o, 1500);
  });
}

// 인사이트: book_insights.json(책별 칭찬 포인트 / 아쉬운 점 요약)을 표시
let bookInsights = [];
let insightBook = '';
function renderInsight() {
  const el = document.getElementById('tab-insight');
  const allBooks = bookInsights;
  if (!allBooks.length) {
    el.innerHTML = `<div class="empty">아직 인사이트 데이터가 없습니다.</div>`;
    return;
  }
  if (insightBook && !allBooks.some(b => b.book === insightBook)) insightBook = '';
  const all = insightBook ? allBooks.filter(b => b.book === insightBook) : allBooks;
  const opts = `<option value="">📚 전체 도서 (${allBooks.length}종)</option>` +
    allBooks.map(b => `<option value="${b.book.replace(/"/g, '&quot;')}"${b.book === insightBook ? ' selected' : ''}>${b.book} (${b.count}건)</option>`).join('');
  let html = `<div class="best-head">📊 책별 독자 반응 한눈에 <span class="best-count">${all.length}종</span></div>
    <div class="best-toolbar"><select id="insight-book" onchange="insightBook=this.value; renderInsight()">${opts}</select></div>
    <div class="best-note"><b>이렇게 정리했어요</b> — 책마다 실제 후기를 모아 <b>독자들이 자주 칭찬한 점</b>과 <b>아쉬워한 점</b>을 요약했습니다. 리뷰를 다 읽지 않아도 핵심을 파악하고, 칭찬 포인트는 마케팅에, 아쉬운 점은 개정·기획에 참고하세요. (후기 수가 적은 책은 표본이 작으니 참고만)</div>`;
  all.forEach(b => {
    const stars = '★'.repeat(Math.round(b.avg)) + '☆'.repeat(5 - Math.round(b.avg));
    const praise = (b.praise || []).map(p => `<li>${p}</li>`).join('');
    const cons = (b.cons || []).map(c => `<li>${c}</li>`).join('');
    html += `<div class="ins-card">
      <div class="ins-head">
        <span class="ins-book">${b.book}</span>
        <span class="ins-meta">후기 ${b.count}건 · 평균 <b>${b.avg}</b> <span class="ins-stars">${stars}</span></span>
      </div>
      <div class="ins-sec ins-good"><div class="ins-label">👍 자주 칭찬한 점</div><ul>${praise || '<li class="ins-none">—</li>'}</ul></div>
      ${cons ? `<div class="ins-sec ins-bad"><div class="ins-label">⚠️ 아쉬워한 점</div><ul>${cons}</ul></div>`
             : `<div class="ins-sec ins-clean">⚠️ 아쉬운 점으로 두드러진 의견 없음</div>`}
    </div>`;
  });
  el.innerHTML = html;
}

// 비용 없이 유형별 추천 응대 문구(초안) 생성
function suggestResponse(r) {
  const text = r.text || '';
  // 응대 문구에는 본 제목만 (부제·시리즈명·저자 제거: '본제목 | 부제 | 저자' → '본제목')
  const title = (r.title || '').split('|')[0].trim();
  const book = (title && !/^\d+$/.test(title)) ? `《${title}》` : '해당 도서';
  // 긍정 리뷰(대응 불필요)에는 감사 답글
  if (!needsResponse(r))
    return `안녕하세요, 이지스퍼블리싱입니다. ${book}을(를) 읽고 좋은 후기를 남겨주셔서 진심으로 감사합니다. 보내주신 응원이 큰 힘이 됩니다. 앞으로도 좋은 책으로 보답하겠습니다. 오늘도 좋은 하루 보내세요 :)`;
  const has = (...ks) => ks.some(k => text.includes(k));
  if (has('파본','파손','훼손'))
    return `안녕하세요, 이지스퍼블리싱입니다. ${book}을(를) 파본 상태로 받으시게 해 죄송합니다. 파본은 구매하신 서점 고객센터에서 교환하실 수 있습니다. 불편을 드려 다시 한번 사과드립니다.`;
  if (has('환불','반품'))
    return `안녕하세요, 이지스퍼블리싱입니다. ${book} 구매 과정에서 불편을 드려 죄송합니다. 환불·교환은 구매처 고객센터에서, 도서 내용 문의는 출판사로 연락 주시면 성심껏 돕겠습니다. 소중한 의견 감사합니다.`;
  if (has('오타','오류','에러','안 돼','안돼','안 됨','안됨','작동 안','실행 안','동작 안','누락'))
    return `안녕하세요, 이지스퍼블리싱입니다. ${book} 학습에 불편을 드려 죄송합니다. 말씀해주신 부분을 편집부에서 확인해 정오표·자료 업데이트에 반영하겠습니다. 페이지나 예제 위치를 알려주시면 더 빠르게 도와드리겠습니다. 소중한 의견 감사합니다.`;
  return `안녕하세요, 이지스퍼블리싱입니다. ${book}을(를) 읽어주셔서 감사합니다. 주신 의견은 더 나은 책을 만드는 데 소중히 참고하겠습니다. 오늘도 좋은 하루 보내세요 :)`;
}

function copyText(btn) {
  const t = btn.closest('.an-suggest').querySelector('.an-suggest-text').textContent;
  navigator.clipboard.writeText(t).then(() => {
    const old = btn.textContent;
    btn.textContent = '복사됨';
    setTimeout(() => { btn.textContent = old; }, 1500);
  });
}

function renderStats() {
  const todayCount = allReviews.filter(r => r.date === TODAY).length;
  const weekAgo = toISO(new Date(Date.now() - 7 * 86400000));
  const weekCount = allReviews.filter(r => r.date >= weekAgo).length;
  const rated = allReviews.map(r => parseRating(r.rating)).filter(n => n !== null);
  const avg = rated.length ? (rated.reduce((s,n)=>s+n,0) / rated.length).toFixed(1) : '-';
  const lowCount = allReviews.filter(isActionable).length;

  const stats = document.getElementById('stats');
  stats.style.display = '';
  stats.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">오늘 새 리뷰</div>
      <div class="stat-value">${todayCount}개</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">최근 7일</div>
      <div class="stat-value">${weekCount}개</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">평균 별점</div>
      <div class="stat-value">${avg === '-' ? '-' : '⭐ ' + avg}</div>
      <div class="stat-sub">전체 ${allReviews.length}개 기준</div>
    </div>
    <div class="stat-card${lowCount ? ' alert clickable' : ''}"${lowCount ? ' onclick="scrollToActionNeeded()"' : ''}>
      <div class="stat-label">대응 필요 (최근 ${AN_WINDOW_DAYS}일)</div>
      <div class="stat-value">${lowCount}개</div>
      ${lowCount ? '<div class="stat-sub">클릭해서 확인 →</div>' : ''}
    </div>`;
}

function render(reviews) {
  const content = document.getElementById('content');
  document.getElementById('count-badge').textContent = `${reviews.length}개`;
  if (!reviews.length) {
    content.innerHTML = `<div class="empty">조건에 맞는 리뷰가 없습니다.<br>
      검색어나 필터를 바꿔서 다시 찾아보세요.<br>
      <button onclick="resetFilters()">필터 초기화</button></div>`;
    return;
  }

  const byDate = {};
  reviews.forEach(r => {
    (byDate[r.date] = byDate[r.date] || {})[r.title] =
      (byDate[r.date][r.title] || []).concat(r);
  });

  const flagged = reviews.filter(isActionable).sort((a,b) => b.date.localeCompare(a.date));
  let html = '';
  if (flagged.length) {
    html += `<div class="action-needed">
      <div class="action-head">⚠️ 대응이 필요한 리뷰 <span class="an-count">${flagged.length}</span> <span class="an-hint">ⓘ 기준</span>
        <span class="an-tip">최근 ${AN_WINDOW_DAYS}일 이내 올라온 별점 ★2 이하(5점 환산) 리뷰. ${AN_WINDOW_DAYS}일이 지나면 자동으로 사라집니다. 추천 응대는 유형별 템플릿으로 자동 생성됩니다.</span>
      </div>`;
    flagged.forEach(rv => {
      html += `<div class="an-item">
        <div class="an-meta">
          <span class="store-badge ${rv.store}">${storeLabel(rv.store)}</span>
          ${ratingBadge(rv.rating)}
          <a class="an-book" href="${rv.link||'#'}" target="_blank">${rv.title}</a>
          <span class="review-reviewer">${rv.reviewer||''} · ${formatDate(rv.date)}</span>
        </div>
        <div class="review-text">${rv.text||'(내용 없음)'}</div>
        <div class="an-suggest">
          <div class="an-suggest-head">💬 추천 응대 <button class="an-copy" onclick="copyText(this)">복사</button></div>
          <div class="an-suggest-text">${suggestResponse(rv)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  Object.keys(byDate).sort((a,b)=>b.localeCompare(a)).forEach(date => {
    const dayCount = Object.values(byDate[date]).reduce((s,a)=>s+a.length,0);
    const isToday = date === TODAY;
    html += `<div class="date-group">
      <div class="date-label${isToday ? ' today' : ''}">
        ${formatDate(date)}
        <span class="day-count">${dayCount}개</span>
        ${isToday ? '<span class="new-badge">NEW</span>' : ''}
      </div>`;

    Object.entries(byDate[date]).sort((a,b)=>b[1].length-a[1].length).forEach(([title, rvs]) => {
      const link = rvs.find(r=>r.link)?.link || '#';
      html += `<div class="book-group">
        <div class="book-title">
          <a href="${link}" target="_blank">${title}</a>
          <span class="book-count">리뷰 ${rvs.length}개</span>
        </div>
        <div class="review-list">`;

      rvs.forEach(rv => {
        const n = parseRating(rv.rating);
        const low = n !== null && n <= 2;
        html += `<div class="review-item${low ? ' low-rating' : ''}">
          <div class="review-meta">
            <span class="store-badge ${rv.store}">${storeLabel(rv.store)}</span>
            ${ratingBadge(rv.rating)}
            <span class="review-reviewer">${rv.reviewer||''}</span>
          </div>
          <div class="review-text">${rv.text||'(내용 없음)'}</div>
          ${!needsResponse(rv) ? `<details class="an-suggest an-collapse">
            <summary>💬 추천 답글 보기</summary>
            <div class="an-suggest-text">${suggestResponse(rv)}</div>
            <button class="an-copy" onclick="copyText(this)">복사</button>
          </details>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;
  });
  content.innerHTML = html;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const store = document.getElementById('store-filter').value;
  const dateVal = selectedDate;
  document.getElementById('reset-filters').style.display =
    (q || store || dateVal) ? '' : 'none';
  render(allReviews.filter(r =>
    (!store || r.store === store) &&
    (!dateVal || r.date === dateVal) &&
    (!q || r.title.toLowerCase().includes(q) || (r.text||'').toLowerCase().includes(q))
  ));
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('store-filter').value = '';
  selectedDate = '';
  updateDateBtn();
  applyFilters();
}

async function load() {
  try {
    const res = await fetch('reviews_log.json?_=' + Date.now());
    allReviews = (await res.json()).sort((a,b)=>b.date.localeCompare(a.date));

    try { marketingQuotes = await (await fetch('marketing_quotes.json?_=' + Date.now())).json(); }
    catch (e) { marketingQuotes = []; }
    try { bookInsights = await (await fetch('book_insights.json?_=' + Date.now())).json(); }
    catch (e) { bookInsights = []; }

    const dates = [...new Set(allReviews.map(r=>r.date))].sort((a,b)=>b.localeCompare(a));
    dateCounts = {};
    allReviews.forEach(r => dateCounts[r.date] = (dateCounts[r.date] || 0) + 1);
    if (dates.length) {
      minYM = dates[dates.length - 1].slice(0, 7);
      maxYM = dates[0].slice(0, 7) > TODAY.slice(0, 7) ? dates[0].slice(0, 7) : TODAY.slice(0, 7);
      openMonthOf(dates[0]);
    }

    document.getElementById('last-updated').textContent =
      `리뷰 작성일 기준 · 최신 리뷰: ${dates[0] ? formatDate(dates[0]) : '-'} | 총 ${allReviews.length}개`;
    renderStats();
    render(allReviews);
  } catch(e) {
    document.getElementById('content').innerHTML =
      `<div class="empty">아직 표시할 리뷰 데이터가 없습니다.<br>
      리뷰 수집이 한 번 실행된 뒤에 데이터가 나타나요. 잠시 후 새로고침해 주세요.</div>`;
  }
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('store-filter').addEventListener('change', applyFilters);
document.getElementById('reset-filters').addEventListener('click', resetFilters);

document.getElementById('date-btn').addEventListener('click', () => {
  const cal = document.getElementById('calendar');
  const opening = !cal.classList.contains('open');
  if (opening) {
    if (selectedDate) openMonthOf(selectedDate);
    buildCalendar();
  }
  cal.classList.toggle('open', opening);
});

document.getElementById('calendar').addEventListener('click', e => {
  const nav = e.target.closest('.cal-nav');
  if (nav && !nav.disabled) {
    calM += parseInt(nav.dataset.nav);
    if (calM < 0) { calM = 11; calY--; }
    if (calM > 11) { calM = 0; calY++; }
    buildCalendar();
    return;
  }
  const day = e.target.closest('.cal-day[data-date]');
  if (day) {
    selectedDate = day.dataset.date === selectedDate ? '' : day.dataset.date;
    updateDateBtn();
    closeCalendar();
    applyFilters();
    return;
  }
  if (e.target.id === 'cal-clear' && selectedDate) {
    selectedDate = '';
    updateDateBtn();
    closeCalendar();
    applyFilters();
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.date-picker')) closeCalendar();
});
load();
</script>
