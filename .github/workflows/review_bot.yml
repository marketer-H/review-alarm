name: 구매평 알림봇

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 0시 UTC = 한국 오전 9시 (실제 도착 9~12시)
  workflow_dispatch:       # GitHub에서 수동 실행 버튼
    inputs:
      send_discord:
        description: '디스코드 알림 보내기 (끄면 알림 없이 수집만 — 테스트용)'
        type: boolean
        default: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # review_state.json 커밋 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests playwright && playwright install chromium --with-deps

      - name: config.json 생성
        run: |
          echo '{
            "discord_webhook": "${{ secrets.DISCORD_WEBHOOK }},${{ secrets.DISCORD_WEBHOOK_2 }}",
            "stores": ["aladin", "yes24", "kyobo"]
          }' > config.json

      - name: 신간 자동 발견 (이지스퍼블리싱)
        run: python update_isbns.py

      - name: 구매평 봇 실행
        # ⏸ 디스코드 알림 일시 중단 중 — 대시보드 수집/업데이트는 계속, 발송만 안 함.
        # 알림을 다시 켜려면 아래 run을 지우고 주석의 '원래 실행'으로 되돌리세요.
        run: python review_bot.py --no-discord
        # 원래 실행(알림 ON):
        #   if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.send_discord }}" = "false" ]; then
        #     python review_bot.py --no-discord
        #   else
        #     python review_bot.py
        #   fi

      - name: 상태 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_state.json isbn_cache.json reviews_log.json isbns.txt
          git diff --staged --quiet || git commit -m "chore: update review state & log"
          git push
