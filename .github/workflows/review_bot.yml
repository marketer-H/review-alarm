name: 구매평 알림봇

on:
  schedule:
    - cron: '0 0 * * *'   # 매일 0시 UTC = 한국 오전 9시
  workflow_dispatch:       # GitHub에서 수동 실행 버튼

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # review_state.json 커밋 권한

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests playwright && playwright install chromium --with-deps

      - name: config.json 생성
        run: |
          echo '{
            "discord_webhook": "${{ secrets.DISCORD_WEBHOOK }},${{ secrets.DISCORD_WEBHOOK_2 }}",
            "stores": ["aladin", "yes24", "kyobo"]
          }' > config.json

      - name: 구매평 봇 실행
        run: python review_bot.py

      - name: 상태 파일 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review_state.json isbn_cache.json reviews_log.json
          git diff --staged --quiet || git commit -m "chore: update review state & log"
          git push
